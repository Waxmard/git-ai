name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
      - "git-ai-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: PyPI publish
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.10"
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
