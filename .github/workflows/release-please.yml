name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GIT_AI_RELEASE_PLEASE_TOKEN }}

      - name: Auto-merge release PR
        if: steps.release.outputs.pr != ''
        run: gh pr merge --rebase --auto --repo "${{ github.repository }}" "${{ fromJSON(steps.release.outputs.pr).number }}"
        env:
          GH_TOKEN: ${{ secrets.GIT_AI_RELEASE_PLEASE_TOKEN }}
