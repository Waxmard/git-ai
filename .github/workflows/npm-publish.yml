name: Publish to npm

on:
  push:
    tags:
      - "v*"
      - "git-ai-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Pin npm
        run: npm install -g npm@^11.10.0
      - name: Show versions
        run: |
          node --version
          npm --version
      - name: Publish
        run: npm publish --access public
