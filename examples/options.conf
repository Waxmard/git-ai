# git-ai options config — drop at $XDG_CONFIG_HOME/git-ai/options.conf
# (typically ~/.config/git-ai/options.conf).
#
# Each [provider] header enables that auth method. Model IDs listed under
# the header appear in `git-ai options` output and can be passed to
# `git-ai commit` / `git-ai pr`. An empty section hides that provider
# entirely. Remove this file to restore the full shipped catalog.
#
# Custom model IDs (not in the shipped catalog) are passed through to the
# provider verbatim, so you can add new releases without waiting for a
# git-ai update.
#
# Valid providers: vertex, gemini-api, claude-code, anthropic-api, codex,
# openai-api. Unknown providers are silently ignored.

[claude-code]
claude-haiku-4-5-20251001
claude-sonnet-4-6
claude-opus-4-6

[anthropic-api]
claude-haiku-4-5-20251001
claude-sonnet-4-6

[codex]
gpt-5.4-mini
gpt-5.4

[gemini-api]
gemini-3.1-flash-lite-preview
gemini-3.1-pro-preview

# Empty section — keeps the header for reference but hides this provider
# from the picker.
[vertex]

[openai-api]
